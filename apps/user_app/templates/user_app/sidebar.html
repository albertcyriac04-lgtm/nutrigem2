<aside class="fixed left-0 top-0 h-full w-64 bg-white border-r border-slate-200 z-10 hidden md:block flex flex-col">
    <div class="p-6 flex-1 flex flex-col">
        <h2 class="text-xl font-bold text-slate-800 mb-8">NutriDiet</h2>
        <nav class="space-y-2 flex-1">
            <a href="{% url 'index' %}"
                class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg transition-colors {% if request.resolver_match.url_name == 'index' %}bg-emerald-50 text-emerald-600{% else %}text-slate-600 hover:bg-slate-50{% endif %}">
                <i class="fas fa-chart-line w-5"></i>
                <span>Dashboard</span>
            </a>
            <a href="{% url 'logs' %}"
                class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg transition-colors {% if request.resolver_match.url_name == 'logs' %}bg-emerald-50 text-emerald-600{% else %}text-slate-600 hover:bg-slate-50{% endif %}">
                <i class="fas fa-utensils w-5"></i>
                <span>Food Logs</span>
            </a>
            <a href="{% url 'coach' %}"
                class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg transition-colors {% if request.resolver_match.url_name == 'coach' %}bg-emerald-50 text-emerald-600{% else %}text-slate-600 hover:bg-slate-50{% endif %}">
                <i class="fas fa-robot w-5"></i>
                <span>AI Coach</span>
            </a>
            <a href="{% url 'settings' %}"
                class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg transition-colors {% if request.resolver_match.url_name == 'settings' %}bg-emerald-50 text-emerald-600{% else %}text-slate-600 hover:bg-slate-50{% endif %}">
                <i class="fas fa-cog w-5"></i>
                <span>Settings</span>
            </a>
            <a href="{% url 'billing' %}"
                class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg transition-colors {% if request.resolver_match.url_name == 'billing' %}bg-emerald-50 text-emerald-600{% else %}text-slate-600 hover:bg-slate-50{% endif %}">
                <i class="fas fa-file-invoice-dollar w-5"></i>
                <span>Billing</span>
            </a>
            {% if user.is_staff %}
            <a href="{% url 'admin:index' %}"
                class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg transition-colors text-indigo-600 hover:bg-indigo-50">
                <i class="fas fa-user-shield w-5"></i>
                <span>Admin Panel</span>
            </a>
            {% endif %}
        </nav>

        <div class="pt-4 border-t border-slate-200">
            <a href="{% url 'logout' %}" onclick="return confirm('Are you sure you want to logout?')"
                class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg transition-colors text-red-600 hover:bg-red-50 w-full">
                <i class="fas fa-sign-out-alt w-5"></i>
                <span>Logout</span>
            </a>
        </div>
    </div>
</aside>

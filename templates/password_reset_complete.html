{% extends "base.html" %}

{% block title %}Password Reset Complete - NutriDiet{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
        <div
            class="bg-green-100 text-green-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-sm border border-green-200">
            <i class="fas fa-check-circle text-2xl"></i>
        </div>
        <h2 class="text-3xl font-extrabold text-slate-900">
            Password reset complete
        </h2>
        <p class="mt-4 text-slate-600">
            Your password has been set. You may now log in.
        </p>
        <div class="mt-8">
            <a href="{% url 'login' %}"
                class="inline-flex items-center justify-center px-6 py-3 border border-transparent text-base font-medium rounded-xl text-white bg-blue-600 hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all">
                Sign In
            </a>
        </div>
    </div>
</div>
{% endblock %}

{% load i18n static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Sign In - NutriDiet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md px-4">
        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl shadow-lg shadow-blue-200 mb-4">
                <i class="fas fa-gem text-white text-2xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900">Admin Panel</h1>
            <p class="mt-2 text-sm text-slate-500">Sign in to manage NutriDiet</p>
        </div>

        <div class="bg-white py-8 px-6 shadow-xl border border-slate-100 rounded-2xl">
            {% if form.errors %}
            <div
                class="mb-6 px-4 py-3 bg-red-50 border border-red-100 rounded-xl text-red-700 text-sm font-medium flex items-center gap-2">
                <i class="fas fa-circle-xmark"></i>
                Invalid username or password. Please try again.
            </div>
            {% endif %}

            <form method="post" action="{{ app_path }}" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label for="id_username"
                        class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Username</label>
                    <input type="text" name="username" id="id_username" autofocus required
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                        placeholder="Enter admin username">
                </div>
                <div>
                    <label for="id_password"
                        class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Password</label>
                    <input type="password" name="password" id="id_password" required
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                        placeholder="Enter password">
                </div>
                <input type="hidden" name="next" value="{{ next }}">
                <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-blue-200 flex items-center justify-center gap-2">
                    <i class="fas fa-lock"></i>
                    Sign In
                </button>
            </form>
        </div>

        <p class="mt-6 text-center text-xs text-slate-400">
            <a href="{% url 'login' %}" class="text-blue-600 hover:text-blue-700 font-medium">← Back to User Login</a>
        </p>
    </div>
</body>

</html>
